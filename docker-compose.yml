

services:

  #############################################################
  # FastAPI
  #############################################################

  api:

    build:

      context: .

      dockerfile: Dockerfile

    container_name: multimodal-api

    restart: unless-stopped

    ports:

      - "8000:8000"

    environment:

      PYTHONPATH: /app

    volumes:

      - ./artifacts:/app/artifacts

      - ./data:/app/data

      - ./logs:/app/logs

      - ./outputs:/app/outputs

      - ./mlruns:/app/mlruns

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 30s

    networks:

      - multimodal-network



  #############################################################
  # Streamlit
  #############################################################

  streamlit:

    build:

      context: .

      dockerfile: Dockerfile.streamlit

    container_name: multimodal-streamlit

    restart: unless-stopped

    depends_on:

      api:

        condition: service_healthy

    ports:

      - "8501:8501"

    environment:

      PYTHONPATH: /app

      API_URL: http://api:8000

    volumes:

      - ./artifacts:/app/artifacts

      - ./data:/app/data

      - ./logs:/app/logs

      - ./outputs:/app/outputs

      - ./mlruns:/app/mlruns

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]

      interval: 30s

      timeout: 10s

      retries: 3

      start_period: 30s

    networks:

      - multimodal-network



  #############################################################
  # MLflow
  #############################################################

  mlflow:

    image: python:3.11-slim

    container_name: multimodal-mlflow

    restart: unless-stopped

    working_dir: /app

    command: >
      sh -c "
      pip install --no-cache-dir mlflow &&
      mlflow ui
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000
      "

    volumes:

      - ./mlruns:/app/mlruns

      - ./mlflow.db:/app/mlflow.db

    ports:

      - "5000:5000"

    networks:

      - multimodal-network


#############################################################
# Network
#############################################################

networks:

  multimodal-network:

    driver: bridge