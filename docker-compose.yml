# ============================================================
# Multimodal Legal Risk Auditor — Docker Compose
# ============================================================
# Launch everything: docker-compose up
# ============================================================

services:

  # ---- FastAPI Backend ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./artifacts/models/final:/app/artifacts/models/final:ro
      - ./data/processed:/app/data/processed:ro
      - ./logs:/app/logs
      - mlflow_data:/app/mlflow
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_DIR=logs
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # GPU support — uncomment if NVIDIA runtime is available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ---- Streamlit Frontend ----
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./logs:/app/logs
    environment:
      - API_BASE_URL=http://api:8000
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; requests.get('http://localhost:8501/_stcore/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ---- MLflow Tracking UI ----
  mlflow:
    image: python:3.11-slim
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlruns:/mlflow/mlruns
    working_dir: /mlflow
    command: >
      bash -c "pip install --no-cache-dir mlflow &&
               mlflow ui
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow/mlflow.db"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; requests.get('http://localhost:5000').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  mlflow_data:
